name: recetarios
description: "Recipe books manager: books, chapters and recipes with PDF export."
publish_to: 'none'

version: 1.3.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_riverpod: ^3.0.3
  provider: ^6.1.5
  go_router: ^16.3.0
  file_selector: ^1.0.3
  open_filex: ^4.5.0
  cupertino_icons: ^1.0.8
  markdown: ^7.3.0
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.5
  path: ^1.9.0
  crypto: ^3.0.6
  pdf: ^3.13.0
  printing: ^5.14.2
  archive: ^4.0.4
  image: ^4.3.0
  appflowy_editor: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# Patched copy: published 6.2.0 does not compile against this Flutter SDK.
# See third_party/appflowy_editor/VENDORED.md for the patch and removal condition.
dependency_overrides:
  appflowy_editor:
    path: third_party/appflowy_editor

flutter:
  uses-material-design: true
  generate: true
