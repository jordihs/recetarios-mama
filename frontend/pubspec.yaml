name: recetarios
description: "Recipe books manager: books, chapters and recipes with PDF export."
publish_to: 'none'

version: 1.2.1+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_riverpod: ^3.0.3
  provider: ^6.1.5
  go_router: ^16.3.0
  dio: ^5.7.0
  file_selector: ^1.0.3
  open_filex: ^4.5.0
  cupertino_icons: ^1.0.8
  markdown: ^7.3.0
  appflowy_editor: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# Patched copy: published 6.2.0 does not compile against this Flutter SDK.
# See third_party/appflowy_editor/VENDORED.md for the patch and removal condition.
dependency_overrides:
  appflowy_editor:
    path: third_party/appflowy_editor

flutter:
  uses-material-design: true
  generate: true
