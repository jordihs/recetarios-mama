name: Release

# Pushing a version tag (v1.0.1, v2.0.0, ...) builds the Windows app,
# compila el instalador con Inno Setup y publica el release en GitHub.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend (with dev deps and PyInstaller)
        working-directory: backend
        run: pip install -e .[dev] pyinstaller

      - name: Backend tests
        working-directory: backend
        run: pytest

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Frontend dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Frontend tests
        working-directory: frontend
        run: flutter test

      - name: Build Windows package
        run: .\build\build-windows.ps1 -FlutterBin flutter

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        run: |
          $version = '${{ env.RELEASE_TAG }}' -replace '^v', ''
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' `
            "/DAppVersion=$version" `
            build\installer.iss

      - name: Rename installer
        run: |
          Move-Item dist\recetarios-mama-setup.exe `
            "recetarios-mama-${{ env.RELEASE_TAG }}-windows-x64-setup.exe"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: recetarios-mama-${{ env.RELEASE_TAG }}-windows-x64-setup.exe
          generate_release_notes: true
