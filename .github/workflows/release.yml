name: Release

# Pushing a version tag (v1.0.1, v2.0.0, ...) builds the Windows installer
# and the Android APK, then publishes them as a GitHub release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.3.0)'
        required: true

permissions:
  contents: write

jobs:
  # ── Windows installer ───────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Frontend dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Frontend tests
        working-directory: frontend
        run: flutter test

      - name: Build Windows package
        run: .\build\build-windows.ps1 -FlutterBin flutter

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        run: |
          $version = '${{ env.RELEASE_TAG }}' -replace '^v', ''
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' `
            "/DAppVersion=$version" `
            build\installer.iss

      - name: Rename installer
        run: |
          Move-Item dist\recetarios-mama-setup.exe `
            "recetarios-mama-${{ env.RELEASE_TAG }}-windows-x64-setup.exe"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: recetarios-mama-${{ env.RELEASE_TAG }}-windows-x64-setup.exe

  # ── Android APK ─────────────────────────────────────────────────────────────
  android:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Frontend dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Frontend tests
        working-directory: frontend
        run: flutter test

      - name: Build Android APK
        working-directory: frontend
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mv frontend/build/app/outputs/flutter-apk/app-release.apk \
            "recetarios-mama-${{ env.RELEASE_TAG }}-android.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: recetarios-mama-${{ env.RELEASE_TAG }}-android.apk

  # ── Publish GitHub release ──────────────────────────────────────────────────
  publish:
    needs: [windows, android]
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            recetarios-mama-${{ env.RELEASE_TAG }}-windows-x64-setup.exe
            recetarios-mama-${{ env.RELEASE_TAG }}-android.apk
          generate_release_notes: true
