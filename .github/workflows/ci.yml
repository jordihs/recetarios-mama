name: CI

on:
  push:
    # Spec-kit feature branches (NNN-name) get CI on every push.
    branches: [main, '[0-9][0-9][0-9]-*']
  pull_request:

jobs:
  frontend:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
