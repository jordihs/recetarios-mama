name: CI

on:
  push:
    # Spec-kit feature branches (NNN-name) get CI on every push.
    branches: [main, '[0-9][0-9][0-9]-*']
  pull_request:

jobs:
  backend:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e .[dev]
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest

  frontend:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
